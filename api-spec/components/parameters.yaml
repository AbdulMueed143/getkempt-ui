# =============================================================================
#  Reusable parameters — referenced from paths/*.yaml via $ref.
# =============================================================================

# ── Pagination ─────────────────────────────────────────────────────────────
cursor:
  name: cursor
  in: query
  description: Opaque base64 cursor returned by the previous page response.
  required: false
  schema:
    type: string

limit:
  name: limit
  in: query
  description: Max items to return. Default 25, max 100.
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 25

# ── Sorting ────────────────────────────────────────────────────────────────
sort:
  name: sort
  in: query
  description: |
    Sort key prefixed with `-` for descending. Default per-endpoint.
    Examples: `-createdAt`, `lastName`, `-totalBookings`.
  required: false
  schema:
    type: string

# ── Date-range filters used by bookings, visits, dashboards ───────────────
fromDate:
  name: from
  in: query
  description: Inclusive lower bound (ISO-8601 UTC).
  required: false
  schema:
    type: string
    format: date-time

toDate:
  name: to
  in: query
  description: Exclusive upper bound (ISO-8601 UTC).
  required: false
  schema:
    type: string
    format: date-time

# ── Headers ────────────────────────────────────────────────────────────────
idempotencyKey:
  name: Idempotency-Key
  in: header
  description: |
    Client-supplied UUID v4. Server MUST cache the response for 24h and
    return the same result on retry. Required on all POST / PUT / PATCH
    that have side effects.
  required: false
  schema:
    type: string
    format: uuid

ifMatch:
  name: If-Match
  in: header
  description: |
    Optimistic concurrency control. Pass the `version` returned in the
    last GET. Server returns 412 Precondition Failed on stale writes.
  required: false
  schema:
    type: string

acceptLanguage:
  name: Accept-Language
  in: header
  description: BCP-47 locale (e.g. `en-AU`). Default `en-AU`.
  required: false
  schema:
    type: string
    default: en-AU

requestId:
  name: X-Request-Id
  in: header
  description: Client-supplied trace id. Echoed back in the response.
  required: false
  schema:
    type: string

