server {
    listen      8080 default_server;
    listen      [::]:8080 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────
    # SECURITY HEADERS
    # NOTE: tune CSP to your real backend domain
    # before going to production.
    # ──────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Loose CSP starter — replace `connect-src` with your backend URL.
    add_header Content-Security-Policy
      "default-src 'self'; \
       script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com; \
       style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
       font-src 'self' https://fonts.gstatic.com data:; \
       img-src 'self' data: blob: https:; \
       connect-src 'self' https://maps.googleapis.com; \
       frame-ancestors 'self'; \
       base-uri 'self'; \
       form-action 'self'; \
       object-src 'none'" always;

    # ──────────────────────────────────────────
    # CACHING
    #   - hashed assets (Next.js _next/static/...)  : 1 year, immutable
    #   - HTML & root files                          : no cache
    # ──────────────────────────────────────────
    location ~* /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|svg|jpg|jpeg|png|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    location = / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files /index.html =404;
    }

    # ──────────────────────────────────────────
    # SPA / static-export route fallback
    # Next.js export writes one .html per route.
    # Try the explicit file first, fall back to /index.html.
    # ──────────────────────────────────────────
    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # ──────────────────────────────────────────
    # Lock down well-known sensitive paths
    # ──────────────────────────────────────────
    location ~ /\.(?!well-known) { deny all; }
    location  /.git/             { deny all; }
    location ~ /(?:Dockerfile|docker-compose) { deny all; }

    # Custom 404 falls back to the SPA
    error_page 404 /index.html;
}
